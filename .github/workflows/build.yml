name: Build NovaSort Pro (EXE + Installer)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: dotnet restore NovaSortPro/NovaSortPro.csproj

      - name: Publish self-contained portable EXE (win-x64)
        run: >
          dotnet publish NovaSortPro/NovaSortPro.csproj
          -c Release
          -r win-x64
          -p:Platform=x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:WindowsAppSDKSelfContained=true
          -o publish_output

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaSortPro-portable-exe
          path: publish_output/NovaSortPro.exe

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows Installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaSortPro-installer
          path: installer\Output\*.exe

      - name: Create GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish_output/NovaSortPro.exe
            installer/Output/*.exe
